<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TottiBeat – Metronome</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <!-- ── Header ─────────────────────────────────────── -->
    <header class="app-header">
      <h1>🥁 TottiBeat</h1>
      <p class="subtitle">Professional Metronome</p>
    </header>

    <main class="app-main">

      <!-- ── BPM Section ───────────────────────────────── -->
      <section class="card bpm-section" aria-label="BPM control">
        <div class="bpm-row">
          <button class="icon-btn" id="bpm-dec" aria-label="Decrease BPM">−</button>
          <div class="bpm-display">
            <input
              type="number"
              id="bpm-input"
              min="20" max="300" value="120"
              aria-label="BPM value"
            />
            <span class="bpm-label">BPM</span>
          </div>
          <button class="icon-btn" id="bpm-inc" aria-label="Increase BPM">+</button>
        </div>
        <input type="range" id="bpm-slider" min="20" max="300" value="120" aria-label="BPM slider" />
        <div class="tempo-name" id="tempo-name">Moderato</div>
      </section>

      <!-- ── Time Signature ────────────────────────────── -->
      <section class="card time-sig-section" aria-label="Beats per bar">
        <label class="section-label">Beats per bar</label>
        <div class="beats-per-bar-grid" id="beats-per-bar-grid">
          <!-- 1–8 generated by JS -->
        </div>
      </section>

      <section class="card subdivision-section" aria-label="Subdivision">
        <label class="section-label">Subdivision</label>
        <div class="subdivision-grid" id="subdivision-grid">
          <!-- generated by JS -->
        </div>
      </section>

      <!-- ── Visual Beat Display ───────────────────────── -->
      <section class="card beat-display-section" aria-label="Beat display">
        <div class="beat-circles" id="beat-circles">
          <!-- circles generated by JS -->
        </div>
      </section>

      <!-- ── Transport Controls ────────────────────────── -->
      <section class="transport-section" aria-label="Transport controls">
        <button class="play-btn" id="play-btn" aria-pressed="false">
          <span class="play-icon">▶</span>
          <span class="play-text">Start</span>
        </button>
        <button class="tap-btn" id="tap-btn" type="button" aria-label="Tap tempo">
          Tap Tempo
        </button>
      </section>

      <!-- ── Beat Settings ─────────────────────────────── -->
      <section class="card beat-settings-section" aria-label="Beat settings">
        <div class="settings-header">
          <span class="section-label">Beat Settings</span>
          <label class="toggle-label">
            <input type="checkbox" id="uniform-toggle" />
            <span class="toggle-track"></span>
            <span class="toggle-text">Same for all beats</span>
          </label>
        </div>

        <!-- Uniform settings panel -->
        <div id="uniform-panel" class="beat-config-panel">
          <label class="config-label">Sound</label>
          <div class="sound-picker" id="uniform-sound-picker">
            <!-- buttons generated by JS -->
          </div>
          <label class="config-label">Color</label>
          <div class="color-picker" id="uniform-color-picker">
            <!-- swatches generated by JS -->
          </div>
        </div>

        <!-- Per-beat settings panel -->
        <div id="per-beat-panel" class="per-beat-panel hidden">
          <div id="per-beat-list">
            <!-- rows generated by JS -->
          </div>
        </div>
      </section>

      <!-- ── Presets ───────────────────────────────────── -->
      <section class="card presets-section" aria-label="Presets">
        <div class="section-label">Saved Presets</div>
        <div class="presets-grid" id="presets-grid">
          <!-- slots generated by JS -->
        </div>
      </section>

    </main>
  </div>

  <!-- Beat config popover (shared) -->
  <div id="beat-popover" class="beat-popover hidden" role="dialog" aria-modal="true" aria-label="Beat configuration">
    <div class="popover-title">Beat <span id="popover-beat-num">1</span></div>
    <label class="config-label">Sound</label>
    <div class="sound-picker" id="popover-sound-picker"></div>
    <label class="config-label">Color</label>
    <div class="color-picker" id="popover-color-picker"></div>
    <button class="close-btn" id="popover-close" aria-label="Close">✕</button>
  </div>
  <div id="popover-backdrop" class="popover-backdrop hidden"></div>

  <div id="preset-modal" class="app-modal hidden" role="dialog" aria-modal="true" aria-labelledby="preset-modal-title" aria-describedby="preset-modal-description">
    <div class="popover-title" id="preset-modal-title">Save preset</div>
    <p class="modal-description" id="preset-modal-description"></p>
    <label class="config-label hidden" id="preset-name-label" for="preset-name-input">Preset name</label>
    <input class="modal-input hidden" id="preset-name-input" type="text" maxlength="40" autocomplete="off" />
    <div class="modal-actions">
      <button class="preset-btn" id="preset-modal-cancel" type="button">Cancel</button>
      <button class="preset-btn save-btn" id="preset-modal-confirm" type="button">Save</button>
    </div>
    <button class="close-btn" id="preset-modal-close" aria-label="Close preset dialog" type="button">✕</button>
  </div>
  <div id="preset-modal-backdrop" class="popover-backdrop hidden"></div>

  <script src="js/app.js"></script>
</body>
</html>
